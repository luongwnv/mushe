<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mushe — listen together</title>
    <!-- YouTube IFrame Player API (loaded once; each room mounts a player) -->
    <script src="https://www.youtube.com/iframe_api"></script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Restore the real path stashed by 404.html (see that file for why). -->
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        var redirect = params.get("redirect");
        if (redirect !== null) {
          history.replaceState(null, "", location.pathname + redirect);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
